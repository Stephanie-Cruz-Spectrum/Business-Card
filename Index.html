<!DOCTYPE html>
<html>
<head>
    <title>Spectrum Business | Digital Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Helvetica', sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; margin: 0; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; margin: 40px auto; overflow: hidden; }
        .header-bar { background: #003057; height: 15px; } /* Spectrum Blue */
        .content { padding: 30px 20px; }
        h1 { color: #003057; margin: 10px 0 5px 0; font-size: 1.8em; }
        h2 { color: #F05A28; font-size: 1em; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; }
        p { color: #444; line-height: 1.6; font-size: 0.95em; }
        .btn { display: block; background: #003057; color: white; padding: 15px; text-decoration: none; border-radius: 10px; margin: 10px 0; font-weight: bold; transition: 0.3s; }
        .btn-secondary { background: #F05A28; } /* Spectrum Orange */
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-bar"></div>
        <div class="content">
            <h1>Stephanie Cruz</h1>
            <h2>Business Account Executive/Project Manager</h2>
            <p>Providing enterprise-grade connectivity and dedicated project management for local businesses.</p>
            
            <a href="mailto:stephanie.cruz@charter.com" class="btn">Email Me</a>
            
            <a href="https://vcard.link/card/HER_NAME.vcf" class="btn btn-secondary">Save My Contact</a>
        </div>
    </div>
</body>
</html>
