<!DOCTYPE html>
<html>
<head>
    <title>Stephanie Cruz | Spectrum Business</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="https://www.spectrum.com/favicon.ico">
    <style>
        body { font-family: 'Helvetica', sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; margin: 0; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 350px; margin: 40px auto; overflow: hidden; }
        
        /* Official Navy Blue Header */
        .logo-header { background: #003057; padding: 30px; display: flex; justify-content: center; align-items: center; }
        .logo-header img { width: 220px; height: auto; }

        .content { padding: 30px 20px; }
        h1 { color: #003057; margin: 15px 0 5px 0; font-size: 1.8em; }
        h2 { color: #F05A28; font-size: 0.9em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-top: 0; line-height: 1.4; }
        
        /* Her updated partner-focused bio */
        p { color: #444; line-height: 1.6; font-size: 0.95em; margin-bottom: 25px; padding: 0 10px; text-align: center; }
        
        .btn { display: block; background: #003057; color: white !important; padding: 15px; text-decoration: none; border-radius: 10px; margin: 10px 0; font-weight: bold; }
        .btn-save { background: #F05A28; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-header">
            <img src="https://cdn.worldvectorlogo.com/logos/spectrum-6.svg" alt="Spectrum Business">
        </div>
        <div class="content">
            <h1>Stephanie Cruz</h1>
            <h2>Business Account Executive / Project Manager</h2>
            <p>Your dedicated partner from initial consultation through implementation and beyond. I’m here to manage your infrastructure today and scale your technology as your business grows.</p>
            
            <a href="mailto:Stephanie.cruz@charter.com" class="btn">Email Me</a>
            <a href="https://vcard.link/card/Ih4t.vcf" class="btn btn-save">Add to Contacts</a>
        </div>
    </div>
</body>
</html>
